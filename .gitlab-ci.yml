# Déploiement GitLab Pages — build Astro statique
# Publie le contenu de `dist/` dans `public/` (dossier attendu par Pages).
image: node:22-alpine

pages:
  stage: deploy
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run build
    - rm -rf public
    - mv dist public
  artifacts:
    paths:
      - public
  rules:
    # publie sur la branche par défaut uniquement
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
